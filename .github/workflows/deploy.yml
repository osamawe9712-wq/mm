# 🚀 نشر موقع Vite/React على GitHub Pages تلقائيًا
# يعمل عند كل push على فرع main

name: Deploy to GitHub Pages

on:
  # تشغيل تلقائي عند الدفع لفرع main
  push:
    branches: [main]
  # السماح بالتشغيل اليدوي من تبويب Actions
  workflow_dispatch:

# الصلاحيات المطلوبة لنشر Pages
permissions:
  contents: read
  pages: write
  id-token: write

# منع تشغيل أكثر من نشر بنفس الوقت
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1️⃣ بناء المشروع
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 🏗️ Build site
        env:
          # تمرير اسم الريبو للـ vite.config ليضبط مسار base تلقائياً
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: 📄 Add SPA 404 fallback
        # نسخ index.html إلى 404.html لدعم React Router عند تحديث الصفحة
        run: cp dist/index.html dist/404.html

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: ⬆️ Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 2️⃣ نشر الموقع
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
